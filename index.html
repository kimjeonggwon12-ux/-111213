        const parseData = (text) => {
            const chaptersData = {
                11: { title: "두 증인과 일곱째 나팔", questions: [] },
                12: { title: "용과 하나님과의 전쟁", questions: [] },
                13: { title: "짐승에게 표 받고 배도한 선민", questions: [] }
            };
            
            let currentChapter = null;
            let lastMatchIdx = { 11: 0, 12: 0, 13: 0 };
            const lines = text.split('\n');

            lines.forEach((line) => {
                const trimmed = line.trim();
                if (!trimmed) return;

                if (trimmed.startsWith("계 11장")) { currentChapter = 11; return; }
                if (trimmed.startsWith("계 12장")) { currentChapter = 12; return; }
                if (trimmed.startsWith("계 13장")) { currentChapter = 13; return; }

                if (currentChapter && trimmed.includes(':')) {
                    const colonIndex = trimmed.indexOf(':');
                    const word = trimmed.substring(0, colonIndex).trim();
                    let details = trimmed.substring(colonIndex + 1).trim();

                    let searchWord = word.replace(/\([^)]+\)/g, '').trim();
                    
                    const refMatch = details.match(/,\s*([창출레민신수삿룻삼왕대스느에욥시잠전아사렘애겔단호욜암옵욘미나합습학슥말마막눅요행롬고갈엡빌골살딤딛몬히약벧요일이삼유계]\s*\d+.*)$/);
                    let meaning = details;
                    let ref = "";
                    if (refMatch) {
                        meaning = details.substring(0, refMatch.index).trim();
                        ref = refMatch[1].trim();
                        meaning = meaning.replace(/,$/, '').trim(); 
                    }

                    let occurrenceIdx = -1; 
                    let highlightWord = searchWord; 

                    if (currentChapter === 13 && searchWord === "에 죽으리니") {
                        meaning = "계 8~9장, 계 16장, 계 19:19~21";
                        ref = "※ 계 18:6, 겔 39:9";
                    }

                    if (currentChapter === 11 && searchWord === "상") {
                        lastMatchIdx[11] = 17; 
                    }
                    if (currentChapter === 12 && searchWord === "그의 사자들") {
                        if (meaning.includes("하나님의 군대")) occurrenceIdx = 1; 
                        if (meaning.includes("사단의 군대")) occurrenceIdx = 2; 
                    }
                    if (currentChapter === 13 && searchWord === "칼") {
                        if (meaning.includes("거짓 교리")) occurrenceIdx = 1; 
                        if (meaning.includes("진리의 말씀")) occurrenceIdx = 2; 
                    }
                    if (currentChapter === 13 && searchWord === "저") {
                        if (chaptersData[13].questions.length > 60) {
                            lastMatchIdx[13] = 15; 
                            occurrenceIdx = 1; 
                        } else {
                            occurrenceIdx = 1; 
                        }
                    }

                    let matchedVerse = "";
                    let matchedVerseNum = 0;
                    const chapterVerses = bibleText[currentChapter];
                    const normalizedSearch = searchWord.replace(/\s+/g, '');
                    
                    if(chapterVerses) {
                        const startIdx = lastMatchIdx[currentChapter];
                        
                        for (let i = startIdx; i < chapterVerses.length; i++) {
                            if (chapterVerses[i].replace(/\s+/g, '').includes(normalizedSearch)) {
                                matchedVerse = chapterVerses[i];
                                matchedVerseNum = i + 1;
                                lastMatchIdx[currentChapter] = i; 
                                break;
                            }
                        }
                        if (!matchedVerse) {
                            for (let i = 0; i < startIdx; i++) {
                                if (chapterVerses[i].replace(/\s+/g, '').includes(normalizedSearch)) {
                                    matchedVerse = chapterVerses[i];
                                    matchedVerseNum = i + 1;
                                    break;
                                }
                            }
                        }
                    }

                    chaptersData[currentChapter].questions.push({
                        originalIdx: chaptersData[currentChapter].questions.length, 
                        word,
                        searchWord,
                        highlightWord,
                        occurrenceIdx,
                        meaning,
                        reference: ref,
                        verseText: matchedVerse,
                        verseNum: matchedVerseNum
                    });
                }
            });

            Object.keys(chaptersData).forEach(chap => {
                chaptersData[chap].questions.sort((a, b) => {
                    if (a.verseNum !== b.verseNum) {
                        return a.verseNum - b.verseNum;
                    }
                    return a.originalIdx - b.originalIdx;
                });
                chaptersData[chap].questions.forEach((q, idx) => {
                    q.id = `${chap}_${idx}`;
                });
            });

            return chaptersData;
        };

        const parsedQuizData = parseData(rawData);

        const HighlightedVerse = ({ text, highlight, occurrenceIdx }) => {
            if (!text || !highlight) return <span className="leading-[1.7] tracking-tight">{text}</span>;
            
            const cleanHighlight = highlight.replace(/\([^)]+\)/g, '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace(/\s+/g, '');
            
            const flexRegexStr = cleanHighlight.split('').join('\\s*');
            const regex = new RegExp(`(${flexRegexStr})`, 'gi');
            
            const parts = text.split(regex);
            if (parts.length === 1) return <span className="leading-[1.7] tracking-tight">{text}</span>;

            let matchCount = 0;
            return (
                <span className="leading-[1.7] break-keep tracking-tight">
                    {parts.map((part, i) => {
                        if (i % 2 === 1) {
                            matchCount++;
                            if (occurrenceIdx === -1 || occurrenceIdx === matchCount) {
                                return (
                                    <span key={i} className="bg-[#e0e7ff] text-[#4f46e5] px-1 rounded font-bold mx-[1px]">
                                        {part}
                                    </span>
                                );
                            } else {
                                return <React.Fragment key={i}>{part}</React.Fragment>;
                            }
                        }
                        return <React.Fragment key={i}>{part}</React.Fragment>;
                    })}
                </span>
            );
        };

                    setCurrentView('home');
                    setPassword(''); // 입력창 초기화
                    return;
                }

                // 2. 13자리이고 시작 번호가 000, 001, 002, 003, 004 중 하나인 경우
                if (val.length === 13) {
                    const regex = /^(000|001|002|003|004)\d{10}$/;

                        setPassword(''); // 입력창 초기화
                    }

                const correctQuestion = allQuestions[qIdx];
                
                const availableWrong = allQuestions.filter((q, idx) => 
                    idx !== qIdx && q.meaning !== correctQuestion.meaning
                );
                
                const shuffledWrong = [...availableWrong].sort(() => 0.5 - Math.random());
                
                const wrongAnswers = [];
                const seenMeanings = new Set([correctQuestion.meaning]);

                for (const w of shuffledWrong) {
                    if (!seenMeanings.has(w.meaning)) {
                        seenMeanings.add(w.meaning);
                        wrongAnswers.push(w);
                    }
                    if (wrongAnswers.length === 2) break;
                }

                const combinedOptions = [
                    { text: correctQuestion.meaning, isCorrect: true },
                    ...wrongAnswers.map(wa => ({ text: wa.meaning, isCorrect: false }))
                ];

                combinedOptions.sort(() => 0.5 - Math.random());
                setOptions(combinedOptions);
            };

            useEffect(() => {
                if (currentView === 'quiz' && selectedChapter) {
                    generateOptions(selectedChapter, currentQuestionIdx);
                    setSelectedOptionIdx(null);
                    setIsAnswerSubmitted(false);
                    setIsCorrect(false);
                    setTimeout(() => {
                        if (scrollRef.current) {
                            scrollRef.current.scrollTo({ top: 0, behavior: 'smooth' });

                    }, 10);

            }, [currentView, selectedChapter, currentQuestionIdx]);

                                </svg>
                            </div>

                            {/* 메인 타이틀 영역 */}
                            <div className="flex flex-col items-center relative z-10 mb-20 drop-shadow-sm">
                                {/* 통통 글자 */}
                                <div className="text-[76px] leading-[0.85] text-[#8b95f6] font-chubby tracking-tight">
                                    통통
                                </div>
                                {/* 계시록 글자 */}
                                <div className="text-[74px] leading-[0.95] text-[#13132e] font-chubby mt-2 tracking-tight">
                                    계시록
                                </div>
                            </div>

                            {/* 암호 입력창 (알약 모양) */}
                            <div className="w-[85%] max-w-[320px] bg-white rounded-full flex items-center p-1.5 shadow-[0_12px_24px_rgba(200,205,230,0.6)] relative z-10">
                                <input 
                                    type="tel"
                                    className="flex-1 bg-transparent outline-none px-5 py-2 text-[15px] font-bold text-[#334155] placeholder-gray-300 w-full"
                                    placeholder="암호 입력 (- 기호 생략)"
                                    value={password}
                                    onChange={handlePasswordChange}
                                />
                                <div className="bg-[#6366f1] text-white rounded-full px-6 py-3 font-extrabold text-[14.5px] shrink-0 shadow-sm cursor-default">
                                    입장
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- 1. 홈 화면 ---
            if (currentView === 'home') {
                return (
                    <div className="flex justify-center bg-[#f2f4fc] min-h-screen">
                        <div className="w-full max-w-[420px] bg-[#f2f4fc] h-[100dvh] flex flex-col relative shadow-xl overflow-hidden">
                            
                            {/* 잠금화면으로 돌아가는 버튼 (우측 상단) */}
                            <button onClick={goLockScreen} className="absolute top-6 right-6 z-50 bg-white/60 backdrop-blur-sm p-2.5 rounded-full shadow-sm text-gray-500 hover:text-[#4f46e5] transition-colors" title="잠금화면으로 가기">
                                <LockIcon className="w-[18px] h-[18px]" />
                            </button>

                            {/* 상단 장식 요소들 */}
                            <div className="absolute top-8 left-6 opacity-30 w-8 h-8 grid grid-cols-3 gap-1">
                                {[...Array(9)].map((_, i) => <div key={i} className="w-[4px] h-[4px] rounded-full bg-[#1d40dc]"></div>)}
                            </div>
                            <div className="absolute top-20 right-8 opacity-40">
                                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                    <circle cx="10" cy="10" r="7" stroke="#8c95e6" strokeWidth="3" />
                                </svg>
                            </div>
                            <div className="absolute top-[150px] left-8 opacity-40 transform -rotate-12">
                                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                                    <path d="M8 0L16 8L8 16L0 8L8 0Z" fill="#8c95e6" />
                                </svg>
                            </div>

                            {/* 메인 콘텐츠 컨테이너 */}
                            <div className="flex-1 flex flex-col items-center pt-24 px-6 z-10 overflow-y-auto pb-48 hide-scrollbar">
                                
                                {/* 1. 타이포그래피 로고 영역 */}
                                <div className="relative flex flex-col items-center mb-10 w-full z-10">
                                    
                                    {/* 알약 뱃지: 본문의 참 뜻 통달 */}
                                    <div className="flex items-center bg-[#e0e7ff] border border-[#c7d2fe] px-4 py-1.5 rounded-full mb-5 shadow-sm">
                                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="mr-1.5 text-[#4f46e5]">
                                            <path d="M12 2 L14.5 9.5 L22 12 L14.5 14.5 L12 22 L9.5 14.5 L2 12 L9.5 9.5 Z" />
                                        </svg>
                                        <span className="text-[#4f46e5] font-extrabold text-[13px] tracking-tight pt-[1px]">본문의 참 뜻 통달</span>
                                    </div>

                                    {/* 메인 타이틀 */}
                                    <div className="flex flex-col items-center relative w-full">
                                        {/* 통통 글자 */}
                                        <div className="text-[90px] leading-[0.85] text-[#8b95f6] font-chubby tracking-tight drop-shadow-sm">
                                            통통
                                        </div>
                                        
                                        {/* 계시록 글자 */}
                                        <div className="text-[86px] leading-[0.95] text-[#13132e] font-chubby mt-2 tracking-tight">
                                            계시록
                                        </div>
                                    </div>

                                    <p className="text-[#65698c] text-[13.5px] font-bold mt-6 tracking-tight z-10 bg-[#f2f4fc]/80 px-2 rounded-lg">
                                        계시록을 통달하는 쉽고 깊이 있는 공부
                                    </p>
                                </div>

                                {/* 2. 장 선택 버튼 리스트 */}
                                <div className="w-full space-y-3.5 relative z-10 max-w-[340px]">
                                    {/* 11장 버튼 */}
                                    <button onClick={() => startChapter(11)} className="w-full bg-white rounded-[20px] p-4 flex items-center justify-between transition-transform active:scale-95 shadow-[0_12px_24px_rgba(200,205,230,0.6)]">
                                        <div className="flex items-center space-x-4">
                                            <div className="w-11 h-11 rounded-full bg-[#5d63d6] text-white font-extrabold flex items-center justify-center text-[18px] shrink-0">
                                                1
                                            </div>
                                            <div className="text-left flex flex-col justify-center">
                                                <h2 className="text-[17.5px] font-black text-[#13132e] mb-0.5 tracking-tight">계시록 11장</h2>
                                                <p className="text-[11.5px] text-[#8c92a6] font-bold tracking-tight">{parsedQuizData[11].title}</p>
                                            </div>
                                        </div>
                                        <span className="text-[#5d63d6] font-bold text-xl mr-2">&gt;</span>
                                    </button>

                                    {/* 12장 버튼 */}
                                    <button onClick={() => startChapter(12)} className="w-full bg-white rounded-[20px] p-4 flex items-center justify-between transition-transform active:scale-95 shadow-[0_12px_24px_rgba(200,205,230,0.6)]">
                                        <div className="flex items-center space-x-4">
                                            <div className="w-11 h-11 rounded-full bg-[#20a469] text-white font-extrabold flex items-center justify-center text-[18px] shrink-0">
                                                2
                                            </div>
                                            <div className="text-left flex flex-col justify-center">
                                                <h2 className="text-[17.5px] font-black text-[#13132e] mb-0.5 tracking-tight">계시록 12장</h2>
                                                <p className="text-[11.5px] text-[#8c92a6] font-bold tracking-tight">{parsedQuizData[12].title}</p>
                                            </div>
                                        </div>
                                        <span className="text-[#20a469] font-bold text-xl mr-2">&gt;</span>
                                    </button>

                                    {/* 13장 버튼 */}
                                    <button onClick={() => startChapter(13)} className="w-full bg-white rounded-[20px] p-4 flex items-center justify-between transition-transform active:scale-95 shadow-[0_12px_24px_rgba(200,205,230,0.6)]">
                                        <div className="flex items-center space-x-4">
                                            <div className="w-11 h-11 rounded-full bg-[#eb4363] text-white font-extrabold flex items-center justify-center text-[18px] shrink-0">
                                                3
                                            </div>
                                            <div className="text-left flex flex-col justify-center">
                                                <h2 className="text-[17.5px] font-black text-[#13132e] mb-0.5 tracking-tight">계시록 13장</h2>
                                                <p className="text-[11.5px] text-[#8c92a6] font-bold tracking-tight">{parsedQuizData[13].title}</p>
                                            </div>
                                        </div>
                                        <span className="text-[#eb4363] font-bold text-xl mr-2">&gt;</span>
                                    </button>
                                </div>
                            </div>

                            {/* 3. 하단 일러스트 배경 (SVG 순수 코드) */}
                            <div className="absolute bottom-0 left-0 w-full h-[320px] z-0 pointer-events-none overflow-hidden">
                                <svg viewBox="0 0 420 320" className="w-full h-full" preserveAspectRatio="xMidYMax slice">
                                    {/* 배경 원형 데코레이션 */}
                                    <circle cx="0" cy="100" r="140" fill="#e2e6fa" opacity="0.6"/>
                                    <circle cx="420" cy="140" r="110" fill="#e2e6fa" opacity="0.6"/>
                                    <path d="M 400 30 L 430 60 L 400 90 Z" fill="#e2e6fa" opacity="0.5" />

                                    {/* 넓은 책상 */}
                                    <path d="M -50 270 L 470 270 L 470 320 L -50 320 Z" fill="#b1b8f0" />
                                    <path d="M -50 285 L 470 285 L 470 320 L -50 320 Z" fill="#8c95e6" />

                                    {/* 왼쪽 큰 화분 식물 */}
                                    <path d="M 35 270 Q 20 160 40 130 Q 60 160 50 270" fill="#7883ea" />
                                    <path d="M 50 270 Q 10 190 15 160 Q 30 190 50 270" fill="#7883ea" />
                                    <path d="M 45 270 Q 90 190 90 150 Q 65 190 45 270" fill="#7883ea" />
                                    {/* 화분 받침과 통 */}
                                    <rect x="25" y="255" width="45" height="45" rx="4" fill="#505acb" />
                                    <rect x="22" y="250" width="51" height="8" rx="2" fill="#444db8" />

                                    {/* 왼쪽 쌓인 책들 */}
                                    <rect x="65" y="250" width="115" height="16" rx="3" fill="#ff6b9a" />
                                    <rect x="70" y="234" width="105" height="16" rx="3" fill="#ffffff" />
                                    <rect x="70" y="218" width="100" height="16" rx="3" fill="#7883ea" />
                                    {/* 책 등 밴드 디자인 */}
                                    <rect x="65" y="250" width="12" height="16" fill="#e05480" />
                                    <rect x="70" y="234" width="10" height="16" fill="#e2e8f0" />
                                    <rect x="70" y="218" width="10" height="16" fill="#505acb" />

                                    {/* 오른쪽 책상 스탠드 조명 */}
                                    <path d="M 330 270 L 380 270 Q 385 260 375 260 L 335 260 Q 325 260 330 270 Z" fill="#4a50c4" />
                                    <line x1="355" y1="260" x2="355" y2="140" stroke="#7883ea" strokeWidth="8" strokeLinecap="round"/>
                                    <line x1="355" y1="140" x2="305" y2="105" stroke="#7883ea" strokeWidth="8" strokeLinecap="round"/>
                                    {/* 스탠드 관절 */}
                                    <circle cx="355" cy="140" r="6" fill="#4a50c4" />
                                    <circle cx="305" cy="105" r="5" fill="#4a50c4" />
                                    {/* 스탠드 전등 갓 */}
                                    <path d="M 310 100 Q 280 120 270 150 L 325 165 Q 330 120 310 100 Z" fill="#505acb" />
                                    {/* 뿜어져 나오는 빛 (반투명) */}
                                    <path d="M 290 160 L 220 270 L 380 270 Z" fill="#ffffff" opacity="0.15" />

                                    {/* 오른쪽 연필 꽂이 상자 */}
                                    <rect x="360" y="220" width="40" height="50" rx="4" fill="#1b2161" />
                                    <rect x="365" y="180" width="8" height="45" rx="3" fill="#ffffff" />
                                    <rect x="378" y="195" width="8" height="30" rx="3" fill="#ff6b9a" />

                                    {/* 가운데 둥글게 펴진 노트/책 */}
                                    <path d="M 175 275 Q 220 285 255 275 Q 290 285 335 275 L 310 215 Q 270 225 255 215 Q 240 225 200 215 Z" fill="#ffffff" />
                                    <path d="M 175 280 Q 220 290 255 280 Q 290 290 335 280 L 335 275 Q 290 285 255 275 Q 220 285 175 275 Z" fill="#d1d5db" />
                                    {/* 가운데 책 접힌 선 */}
                                    <path d="M 255 275 L 255 215" stroke="#e2e8f0" strokeWidth="3" />
                                    
                                    {/* 책 위 굴러다니는 연필 */}
                                    <line x1="285" y1="245" x2="335" y2="260" stroke="#1b2161" strokeWidth="5" strokeLinecap="round" />
                                    <circle cx="285" cy="245" r="2.5" fill="#ff6b9a" />
                                    
                                    {/* 책 사이에 꽂힌 파란색 책갈피 */}
                                    <rect x="235" y="275" width="12" height="25" fill="#1d40dc" />
                                    <path d="M 235 300 L 241 293 L 247 300 Z" fill="#f2f4fc" />
                                </svg>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- 2. 기존 문제 풀이 화면 로직 유지 ---
            const currentChapterData = parsedQuizData[selectedChapter];
            const totalQuestions = currentChapterData.questions.length;
            const currentQuestion = currentChapterData.questions[currentQuestionIdx];

            return (
                <div className="flex justify-center bg-gray-100 min-h-screen font-sans">
                    <div className="w-full max-w-[420px] bg-[#f8fafc] h-[100dvh] flex flex-col relative shadow-2xl overflow-hidden">
                        
                        <div className="bg-white px-5 py-3.5 flex items-center justify-between border-b border-gray-100 shrink-0">
                            <button onClick={goHome} className="p-1 text-gray-400 hover:text-gray-600">
                                <XIcon className="w-5 h-5" />
                            </button>
                            <div className="text-center flex-1">
                                <div className="text-[11px] font-bold text-[#4f46e5] mb-0.5 tracking-tight">계 {selectedChapter}장</div>
                                <div className="font-extrabold text-[#1e3a8a] text-lg tracking-wide">
                                    {currentQuestionIdx + 1} <span className="text-gray-400 font-medium text-[15px]">/ {totalQuestions}</span>
                                </div>
                            </div>
                            <div className="w-7"></div>
                        </div>

                        <div className="bg-white px-5 py-3.5 flex items-center space-x-2 border-b border-gray-100 shrink-0 shadow-sm z-10">
                            <div className="w-[26px] h-[26px] rounded-full border-[1.5px] border-[#ef4444] flex items-center justify-center text-[#ef4444] font-bold text-[11px]">
                                인
                            </div>
                            <div className="text-[14px] font-bold text-[#10b981]">
                                {score} <span className="text-gray-400 font-medium text-[13px]">/ {totalQuestions} 획득</span>
                            </div>
                        </div>

                        <div ref={scrollRef} className="flex-1 overflow-y-auto p-5 pb-32">
                            <div className="bg-[#f4f7ff] border border-[#e5eaff] rounded-xl p-5 mb-4 shadow-sm">
                                <div className="flex items-center space-x-2 mb-2">
                                    <BookOpenIcon className="w-[16px] h-[16px] text-[#6366f1]" />
                                    <span className="text-[#6366f1] text-[13px] font-bold">
                                        계 {selectedChapter}:{currentQuestion.verseNum || '?'}
                                    </span>
                                </div>
                                <div className="text-[#334155] text-[14px] font-medium leading-[1.6]">
                                    {currentQuestion.verseText ? (
                                        <HighlightedVerse 
                                            text={currentQuestion.verseText} 
                                            highlight={currentQuestion.highlightWord} 
                                            occurrenceIdx={currentQuestion.occurrenceIdx}
                                        />
                                    ) : (
                                        <span className="text-gray-400">본문 내용을 찾는 중입니다...</span>
                                    )}
                                </div>
                            </div>

                            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col items-center justify-center min-h-[110px] relative mb-4">
                                <div className="text-[12px] font-black text-gray-400 absolute top-4 left-4">문제</div>
                                <h2 className="text-[26px] font-black text-black mt-2 text-center break-keep tracking-tight">
                                    {currentQuestion.word}
                                </h2>
                            </div>

                            <div className="space-y-3">
                                {options.map((opt, idx) => {
                                    let isSelected = selectedOptionIdx === idx;
                                    let btnClass = "w-full text-left p-4 rounded-xl border-[2px] font-bold text-[15px] leading-snug transition-all flex items-start ";
                                    let badgeClass = "w-[26px] h-[26px] rounded-full flex items-center justify-center text-[13px] font-black mr-3 mt-0.5 shrink-0 ";

                                    if (!isAnswerSubmitted) {
                                        btnClass += "bg-white border-[#f1f5f9] text-[#334155] shadow-sm";
                                        badgeClass += "bg-[#f1f5f9] text-[#64748b]";
                                    } else {
                                        if (opt.isCorrect) {
                                            btnClass += "bg-[#10b981] border-[#10b981] text-white shadow-md";
                                            badgeClass += "bg-white/20 text-white";
                                        } else if (isSelected && !opt.isCorrect) {
                                            btnClass += "bg-white border-[#ef4444] text-[#ef4444]";
                                            badgeClass += "bg-[#fee2e2] text-[#ef4444]";
                                        } else {
                                            btnClass += "bg-[#f8fafc] border-[#f1f5f9] text-[#94a3b8] opacity-60";
                                            badgeClass += "bg-[#f1f5f9] text-[#94a3b8]";
                                        }
                                    }

                                    return (
                                        <button key={idx} onClick={() => handleOptionClick(idx)} disabled={isAnswerSubmitted} className={btnClass}>
                                            <div className={badgeClass}>{idx + 1}</div>
                                            <span className="break-keep pt-[2px]">{opt.text}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {!isAnswerSubmitted && (
                            <div className="bg-white px-4 py-3 border-t border-gray-100 shrink-0 z-20 shadow-[0_-10px_20px_-15px_rgba(0,0,0,0.1)]">
                                <div className="flex space-x-2.5">
                                    <button disabled={currentQuestionIdx === 0} onClick={() => setCurrentQuestionIdx(prev => prev - 1)} className="flex-1 py-3.5 rounded-xl font-extrabold text-gray-500 bg-[#f1f5f9] text-[14.5px] disabled:opacity-50 hover:bg-[#e2e8f0] transition-colors">
                                        &lt; 이전 문제
                                    </button>
                                    <button onClick={handleNextQuestion} className="flex-1 py-3.5 rounded-xl font-extrabold text-[#6366f1] bg-[#eef2ff] hover:bg-[#e0e7ff] text-[14.5px] transition-colors">
                                        다음 문제 &gt;
                                    </button>
                                </div>
                            </div>
                        )}

                        {isAnswerSubmitted && (
                            <div className="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl shadow-[0_-15px_40px_-15px_rgba(0,0,0,0.15)] z-50 flex flex-col animate-slide-up">
                                <div className={`h-[5px] w-full ${isCorrect ? 'bg-[#10b981]' : 'bg-[#ef4444]'}`}></div>
                                
                                <div className="p-5 pb-6">
                                    <div className="flex items-center space-x-3 mb-4">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center ${isCorrect ? 'bg-[#d1fae5] text-[#10b981]' : 'bg-[#fee2e2] text-[#ef4444]'}`}>
                                            {isCorrect ? <CheckIcon className="w-5 h-5" /> : <XIcon className="w-6 h-6" />}
                                        </div>
                                        <h3 className={`text-[18px] font-extrabold tracking-tight ${isCorrect ? 'text-[#10b981]' : 'text-[#ef4444]'}`}>
                                            {isCorrect ? '정답입니다! 도장 획득!' : '아쉽네요, 다시 확인해보세요.'}
                                        </h3>
                                    </div>

                                    <div className="text-[14.5px] leading-relaxed mb-5">
                                        <span className="text-[#4f46e5] font-extrabold">[{currentQuestion.word}]</span> 의 뜻은<br/>
                                        <span className="font-extrabold text-black mt-1.5 block break-keep text-[15.5px]">
                                            {currentQuestion.meaning}
                                        </span> 입니다.
                                        
                                        {currentQuestion.reference && (
                                            <p className="text-[13px] font-bold text-gray-400 mt-3 pt-3 border-t border-gray-100">
                                                참고 성구: {currentQuestion.reference}
                                            </p>
                                        )}
                                    </div>

                                    <div className="flex space-x-2.5">
                                        <button disabled={currentQuestionIdx === 0} onClick={() => { setCurrentQuestionIdx(prev => prev - 1); setIsAnswerSubmitted(false); }} className="flex-1 py-5 rounded-xl font-bold text-gray-500 bg-[#f8fafc] border-[1.5px] border-gray-200 text-[16px] disabled:opacity-50 hover:bg-gray-100 transition-colors">
                                            이전
                                        </button>
                                        <button onClick={handleNextQuestion} className="flex-[2] py-5 rounded-xl font-extrabold text-white bg-[#10b981] shadow-md shadow-[#10b981]/20 text-[16px] hover:bg-[#059669] transition">
                                            다음 문제
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        /* 기본 글꼴 (본문 등) */
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css");
        /* 통통하고 둥근 폰트 (배달의민족 주아) */
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

        * { font-family: "Pretendard Variable", Pretendard, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .font-chubby { font-family: 'Jua', sans-serif; }

        @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slide-up 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        body { margin: 0; padding: 0; background-color: #f1f5f9; }
    </style>
</body>
</html>
